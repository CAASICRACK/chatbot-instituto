<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instituto FAQ Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #1a3a5c;
      --brand-mid:   #2563a8;
      --brand-light: #e8f0fb;
      --accent:      #f59e0b;
      --surface:     #ffffff;
      --bg:          #f4f6f9;
      --text:        #1e293b;
      --muted:       #64748b;
      --border:      #dde3ec;
      --radius-lg:   18px;
      --radius-md:   12px;
      --radius-sm:   8px;
      --shadow:      0 8px 40px rgba(26,58,92,.18), 0 2px 8px rgba(26,58,92,.08);
      --font-body:   'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      min-height: 100vh;
    }

    /* ── FLOATING BUTTON ── */
    #chat-toggle {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-mid), var(--brand));
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(37,99,168,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
      z-index: 1000;
    }
    #chat-toggle:hover { transform: scale(1.1); box-shadow: 0 10px 32px rgba(37,99,168,.55); }
    #chat-toggle svg { width: 28px; height: 28px; transition: opacity .2s, transform .2s; }
    #chat-toggle .icon-open  { position: absolute; }
    #chat-toggle .icon-close { position: absolute; opacity: 0; transform: rotate(-90deg); }
    #chat-toggle.open .icon-open  { opacity: 0; transform: rotate(90deg); }
    #chat-toggle.open .icon-close { opacity: 1; transform: rotate(0deg); }

    /* unread badge */
    #badge {
      position: absolute;
      top: -2px; right: -2px;
      width: 18px; height: 18px;
      background: var(--accent);
      border-radius: 50%;
      border: 2px solid white;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s;
    }

    /* ── CHAT WINDOW ── */
    #chat-window {
      position: fixed;
      bottom: 104px;
      right: 28px;
      width: 370px;
      max-height: 580px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
      transform-origin: bottom right;
      transform: scale(.85) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .25s;
    }
    #chat-window.visible {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    /* ── HEADER ── */
    #chat-header {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-mid) 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .avatar svg { width: 22px; height: 22px; color: white; }
    .header-text { flex: 1; }
    .header-text h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: white;
      letter-spacing: .2px;
    }
    .status {
      font-size: 11.5px;
      color: rgba(255,255,255,.75);
      display: flex; align-items: center; gap: 5px;
    }
    .status::before {
      content: '';
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }
    #close-btn {
      background: rgba(255,255,255,.15);
      border: none;
      border-radius: 50%;
      width: 30px; height: 30px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }
    #close-btn:hover { background: rgba(255,255,255,.3); }
    #close-btn svg { width: 14px; height: 14px; color: white; }

    /* ── MESSAGES ── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--brand-light);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .msg-avatar svg { width: 15px; height: 15px; color: var(--brand-mid); }
    .msg-row.user .msg-avatar { background: var(--accent); }
    .msg-row.user .msg-avatar svg { color: white; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 13.5px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--brand-mid), var(--brand));
      color: white;
      border: none;
      border-bottom-right-radius: 4px;
      border-bottom-left-radius: var(--radius-md);
    }
    .bubble a { color: var(--accent); font-weight: 500; }
    .msg-row.user .bubble a { color: #fde68a; }

    /* typing indicator */
    .typing-bubble {
      background: var(--bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-5px); }
    }

    /* ── QUICK QUESTIONS ── */
    #quick-btns {
      padding: 0 16px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .quick-btn {
      background: var(--brand-light);
      color: var(--brand-mid);
      border: 1.5px solid #c2d8f5;
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 12.5px;
      font-weight: 500;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background .2s, color .2s, transform .15s;
      white-space: nowrap;
    }
    .quick-btn:hover {
      background: var(--brand-mid);
      color: white;
      border-color: var(--brand-mid);
      transform: translateY(-1px);
    }

    /* ── INPUT ── */
    #chat-input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      background: var(--surface);
    }
    #chat-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 13.5px;
      font-family: var(--font-body);
      color: var(--text);
      outline: none;
      background: var(--bg);
      transition: border-color .2s, box-shadow .2s;
    }
    #chat-input::placeholder { color: #a0aec0; }
    #chat-input:focus {
      border-color: var(--brand-mid);
      box-shadow: 0 0 0 3px rgba(37,99,168,.12);
      background: white;
    }
    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-mid), var(--brand));
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 3px 10px rgba(37,99,168,.35);
    }
    #send-btn:hover { transform: scale(1.08); box-shadow: 0 5px 16px rgba(37,99,168,.45); }
    #send-btn svg { width: 17px; height: 17px; color: white; }

    /* ── RESPONSIVE ── */
    @media (max-width: 420px) {
      #chat-window {
        right: 0; bottom: 0;
        width: 100vw;
        max-height: 90vh;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      }
      #chat-toggle { bottom: 20px; right: 16px; }
    }
  </style>
</head>
<body>

  <!-- Floating button -->
  <button id="chat-toggle" aria-label="Abrir chat">
    <span id="badge">1</span>
    <!-- Icon: chat -->
    <svg class="icon-open" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M8 10h.01M12 10h.01M16 10h.01M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"/>
    </svg>
    <!-- Icon: close -->
    <svg class="icon-close" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>

  <!-- Chat window -->
  <div id="chat-window" role="dialog" aria-label="Chat de asistencia">

    <!-- Header -->
    <div id="chat-header">
      <div class="avatar">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 14l9-5-9-5-9 5 9 5zm0 0v6m0-6l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
        </svg>
      </div>
      <div class="header-text">
        <h2>Asistente del Instituto</h2>
        <span class="status">En línea</span>
      </div>
      <button id="close-btn" aria-label="Cerrar chat">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Messages area -->
    <div id="chat-messages"></div>

    <!-- Quick question buttons -->
    <div id="quick-btns"></div>

    <!-- Input -->
    <div id="chat-input-area">
      <input id="chat-input" type="text" placeholder="Escribe tu pregunta…" autocomplete="off"/>
      <button id="send-btn" aria-label="Enviar">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // ================================================================
    //  BASE DE DATOS DE PREGUNTAS FRECUENTES
    //  ---------------------------------------------------------------
    //  Cómo personalizar:
    //   1. Cambia el valor de "respuesta" por el texto real de tu instituto.
    //   2. Añade o quita palabras en "keywords" para que el bot detecte
    //      más variantes de la misma pregunta.
    //   3. Duplica un bloque completo { keywords, respuesta } para agregar
    //      una nueva categoría de pregunta.
    // ================================================================
    const FAQ = [
      {
        // ── CATEGORÍA: Inscripciones / Admisión ──────────────────────
        keywords: ["inscripcion", "inscripciones", "matricula", "matriculas",
                   "registro", "admision", "postular", "ingresar", "requisito",
                   "requisitos", "documentos", "proceso de admision"],
        respuesta: `Para inscribirte necesitas:
• DNI o pasaporte vigente
• Certificado de estudios secundarios
• 2 fotos tamaño carnet

Las inscripciones están abiertas del <strong>1 al 30 de cada mes</strong> en Secretaría (planta baja), de lunes a viernes de 8:00 a 17:00 h.<br><br>
También puedes iniciar el proceso en línea desde nuestra web o escribiendo a <a href="mailto:admision@instituto.edu">admision@instituto.edu</a>`
      },
      {
        // ── CATEGORÍA: Costos / Aranceles ────────────────────────────
        keywords: ["costo", "costos", "precio", "precios", "arancel",
                   "aranceles", "mensualidad", "cuota", "pago", "pagos",
                   "beca", "becas", "financiamiento", "cuanto cuesta"],
        respuesta: `Los costos varían según la carrera. Aquí un resumen orientativo:

• Matrícula inicial: <strong>S/ 350</strong>
• Mensualidad técnica (2 años): <strong>S/ 280 – S/ 380 /mes</strong>
• Mensualidad universitaria (4 años): <strong>S/ 450 – S/ 600 /mes</strong>

Disponemos de <strong>becas parciales</strong> por rendimiento académico y convenios de pago. Consulta en caja o escribe a <a href="mailto:tesoreria@instituto.edu">tesoreria@instituto.edu</a>`
      },
      {
        // ── CATEGORÍA: Carreras / Programas ──────────────────────────
        keywords: ["carrera", "carreras", "programa", "programas",
                   "especialidad", "especialidades", "que estudiar",
                   "oferta academica", "que ofrecen", "cursos", "tecnico",
                   "universitario", "posgrado"],
        respuesta: `Ofrecemos las siguientes carreras:

<strong>Técnicas (2 años)</strong>
• Administración de Empresas
• Contabilidad
• Diseño Gráfico Digital
• Enfermería Técnica

<strong>Universitarias (4 años)</strong>
• Ingeniería de Sistemas
• Administración y Marketing
• Psicología

Visita nuestra web para ver el plan de estudios completo de cada carrera.`
      },
      {
        // ── CATEGORÍA: Horarios ──────────────────────────────────────
        keywords: ["horario", "horarios", "turno", "turnos", "clases",
                   "nocturno", "diurno", "sabatino", "fin de semana",
                   "cuando hay clases", "cuando empieza"],
        respuesta: `Manejamos tres turnos para que puedas estudiar sin conflictos:

• <strong>Mañana:</strong> 7:00 – 13:00 h
• <strong>Tarde:</strong> 13:00 – 19:00 h
• <strong>Noche:</strong> 19:00 – 22:30 h (lun – vie)
• <strong>Sabatino:</strong> 8:00 – 14:00 h (sáb – dom)

Secretaría atiende de <strong>lunes a viernes 8:00 – 20:00 h</strong> y <strong>sábados 8:00 – 13:00 h</strong>.`
      },
      {
        // ── CATEGORÍA: Ubicación / Dirección ─────────────────────────
        keywords: ["ubicacion", "direccion", "donde estan", "donde queda",
                   "como llegar", "sede", "campus", "local", "lugar",
                   "mapa", "direccion"],
        respuesta: `Nuestra sede principal está en:<br><br>
<strong>Av. Universitaria 1450, Piso 3, San Miguel</strong><br><br>
📍 A 2 cuadras del Metropolitano – Estación Honorio Delgado.<br>
🚌 Líneas de bus: 54, 78, C-4.<br><br>
<a href="https://maps.google.com" target="_blank">Ver en Google Maps →</a>`
      },
      {
        // ── CATEGORÍA: Contacto ──────────────────────────────────────
        keywords: ["contacto", "telefono", "correo", "email", "llamar",
                   "whatsapp", "comunicarme", "hablar", "atencion",
                   "soporte", "ayuda"],
        respuesta: `Puedes contactarnos por cualquiera de estos canales:

📞 <strong>Teléfono:</strong> +51 1 234-5678<br>
📱 <strong>WhatsApp:</strong> +51 987 654 321<br>
📧 <strong>Email:</strong> <a href="mailto:info@instituto.edu">info@instituto.edu</a><br><br>
Horario de atención: <strong>Lun – Vie 8:00 – 19:00 h</strong>`
      },
      {
        // ── CATEGORÍA: Modalidad virtual / online ────────────────────
        keywords: ["virtual", "online", "remoto", "a distancia",
                   "plataforma", "zoom", "internet", "en casa"],
        respuesta: `¡Sí ofrecemos modalidad virtual! Todas nuestras carreras cuentan con opción <strong>semipresencial</strong>:

• Clases en vivo por Zoom + grabaciones
• Plataforma LMS propia (acceso 24/7)
• Prácticas presenciales programadas
• Soporte técnico incluido

Para más información escríbenos a <a href="mailto:virtual@instituto.edu">virtual@instituto.edu</a>`
      }
    ];

    // ================================================================
    //  PREGUNTAS RÁPIDAS (botones de acceso directo)
    //  Puedes cambiar las etiquetas o los textos que se envían al hacer clic
    // ================================================================
    const QUICK_QUESTIONS = [
      { label: "📋 Inscripciones", text: "inscripciones" },
      { label: "⏰ Horarios",      text: "horarios"      },
      { label: "📍 Ubicación",     text: "ubicacion"     }
    ];

    // ================================================================
    //  MENSAJE DE BIENVENIDA
    // ================================================================
    const WELCOME_MSG = `¡Hola! 👋 Soy el asistente virtual del <strong>Instituto</strong>.<br>
Estoy aquí para resolver tus dudas sobre carreras, inscripciones, costos y más.<br><br>
¿En qué puedo ayudarte hoy?`;

    // ================================================================
    //  RESPUESTA FALLBACK (cuando no hay coincidencia)
    // ================================================================
    const FALLBACK_MSG = `Hmm, no encontré información exacta sobre eso. 🤔<br><br>
Para una respuesta personalizada puedes contactarnos:<br>
📞 <strong>+51 1 234-5678</strong><br>
📧 <a href="mailto:info@instituto.edu">info@instituto.edu</a><br>
📱 <strong>WhatsApp:</strong> +51 987 654 321`;

    // ================================================================
    //  LÓGICA DEL CHATBOT  –  No es necesario editar debajo de aquí
    // ================================================================

    // Normaliza texto: minúsculas + sin tildes
    function normalize(str) {
      return str.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]/g, " ");
    }

    // Busca la mejor coincidencia en el FAQ
    function findAnswer(input) {
      const words = normalize(input).split(/\s+/).filter(Boolean);
      let bestScore = 0, bestEntry = null;

      for (const entry of FAQ) {
        let score = 0;
        for (const kw of entry.keywords) {
          const normKw = normalize(kw);
          for (const w of words) {
            if (normKw.includes(w) || w.includes(normKw)) score++;
          }
          // Exact phrase match bonus
          if (normalize(input).includes(normKw)) score += 2;
        }
        if (score > bestScore) { bestScore = score; bestEntry = entry; }
      }

      return bestScore > 0 ? bestEntry.respuesta : null;
    }

    // DOM refs
    const toggleBtn  = document.getElementById("chat-toggle");
    const chatWindow = document.getElementById("chat-window");
    const closeBtn   = document.getElementById("close-btn");
    const msgArea    = document.getElementById("chat-messages");
    const quickArea  = document.getElementById("quick-btns");
    const input      = document.getElementById("chat-input");
    const sendBtn    = document.getElementById("send-btn");
    const badge      = document.getElementById("badge");

    let isOpen = false;
    let quickShown = false;

    // SVGs for message avatars
    const botSVG  = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0v6m0-6l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>`;
    const userSVG = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>`;

    function scrollToBottom() {
      msgArea.scrollTop = msgArea.scrollHeight;
    }

    function appendMessage(html, sender) {
      const row = document.createElement("div");
      row.className = `msg-row ${sender}`;
      row.innerHTML = `
        <div class="msg-avatar">${sender === "bot" ? botSVG : userSVG}</div>
        <div class="bubble">${html}</div>`;
      msgArea.appendChild(row);
      scrollToBottom();
    }

    function showTyping() {
      const row = document.createElement("div");
      row.className = "msg-row bot";
      row.id = "typing-row";
      row.innerHTML = `
        <div class="msg-avatar">${botSVG}</div>
        <div class="typing-bubble">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>`;
      msgArea.appendChild(row);
      scrollToBottom();
    }

    function removeTyping() {
      const row = document.getElementById("typing-row");
      if (row) row.remove();
    }

    function buildQuickBtns() {
      if (quickShown) return;
      quickShown = true;
      QUICK_QUESTIONS.forEach(q => {
        const btn = document.createElement("button");
        btn.className = "quick-btn";
        btn.textContent = q.label;
        btn.addEventListener("click", () => {
          appendMessage(q.label, "user");
          quickArea.innerHTML = "";       // hide buttons after first use
          botReply(q.text);
        });
        quickArea.appendChild(btn);
      });
    }

    async function botReply(userInput) {
      showTyping();
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: userInput }),
        });

        if (!res.ok) throw new Error('Error del servidor');

        const data = await res.json();
        removeTyping();
        appendMessage(data.response, "bot");
      } catch (error) {
        removeTyping();
        appendMessage(
          "Lo siento, ha ocurrido un error. Por favor, inténtalo de nuevo o contacta en el <strong>927 01 60 80</strong>.",
          "bot"
        );
      }
    }

    function handleSend() {
      const text = input.value.trim();
      if (!text) return;
      appendMessage(text, "user");
      quickArea.innerHTML = "";           // hide quick-btns once user types
      input.value = "";
      botReply(text);
    }

    // Open / close
    function openChat() {
      isOpen = true;
      chatWindow.classList.add("visible");
      toggleBtn.classList.add("open");
      badge.style.opacity = "0";
      input.focus();
      if (!quickShown && msgArea.children.length === 0) {
        // Delay welcome so animation lands first
        setTimeout(() => {
          appendMessage(WELCOME_MSG, "bot");
          setTimeout(buildQuickBtns, 400);
        }, 200);
      }
    }

    function closeChat() {
      isOpen = false;
      chatWindow.classList.remove("visible");
      toggleBtn.classList.remove("open");
    }

    toggleBtn.addEventListener("click", () => isOpen ? closeChat() : openChat());
    closeBtn.addEventListener("click", closeChat);
    sendBtn.addEventListener("click", handleSend);
    input.addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });
  </script>
</body>
</html>
